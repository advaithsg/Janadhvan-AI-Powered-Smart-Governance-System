{% extends "base.html" %}
{% block title %}Signup{% endblock %}
{% block content %}
<div class="form-page card">
    <h2 class="section-title">Create Citizen Account</h2>
    <form method="POST" action="{{ url_for('signup') }}">
        <div class="form-group"><label for="full_name">Full Name *</label><input type="text" id="full_name" name="full_name" required></div>
        <div class="form-group"><label for="email">Email *</label><input type="email" id="email" name="email" required></div>
        <div class="form-group"><label for="phone">Phone</label><input type="tel" id="phone" name="phone"></div>
        <div class="form-group"><label for="username">Username *</label><input type="text" id="username" name="username" required></div>
        <div class="form-group"><label for="password">Password *</label><input type="password" id="password" name="password" required minlength="6"></div>
        <div class="form-group"><label for="confirm_password">Confirm Password *</label><input type="password" id="confirm_password" name="confirm_password" required></div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Register</button>
    </form>
    <p style="margin-top:1rem;text-align:center;">Have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
