{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="form-page card">
    <h2 class="section-title">Citizen Login</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="identifier">Username or Email *</label>
            <input type="text" id="identifier" name="identifier" required>
        </div>
        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
    </form>
    <p style="margin-top:1rem;text-align:center;">No account? <a href="{{ url_for('signup') }}">Sign up</a></p>
    <p class="hint" style="text-align:center;margin-top:0.5rem;">Admin: username <strong>admin</strong> / password <strong>admin123</strong></p>
</div>
{% endblock %}
